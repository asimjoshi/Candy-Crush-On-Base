<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: white; }
        .screen { display: flex !important; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="grid-container">
            <div id="grid"></div>
        </div>
    </div>
    <script>
        const grid = document.getElementById('grid');
        const width = 8;
        const candyColors = ['color-0', 'color-1', 'color-2', 'color-3', 'color-4', 'color-5'];
        let squares = [];

        for (let i = 0; i < width * width; i++) {
            const square = document.createElement('div');
            let randomColor = Math.floor(Math.random() * candyColors.length);
            square.classList.add('tile');
            square.classList.add(candyColors[randomColor]);
            grid.appendChild(square);
            squares.push(square);
        }

        setTimeout(() => {
            let tile = document.querySelector('.tile');
            console.log("Tile width: " + tile.offsetWidth);
            console.log("Tile height: " + tile.offsetHeight);
            let style = window.getComputedStyle(tile);
            console.log("Tile bgColor: " + style.backgroundColor);
            console.log("Grid height: " + grid.offsetHeight);
        }, 500);
    </script>
</body>
</html>
